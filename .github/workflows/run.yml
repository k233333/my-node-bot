name: Node Classifier

on:
  schedule:
    # 设定为每天 UTC 时间 00:00 运行（对应北京时间早上 8:00）
    - cron: '0 0 * * *' 
  workflow_dispatch: # 这个配置允许你在网页上手动点击按钮立即运行

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Node Classifier
      env:
        # 将你在 Settings 里填写的机密信息传递给 Python 脚本
        SUB_URL: ${{ secrets.SUB_URL }}
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
      run: python process_nodes.py
